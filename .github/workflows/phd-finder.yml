name: PhD Finder — Daily Scrape & Email

on:
  schedule:
    # Run at 08:00 UTC every day
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no emails sent)"
        type: boolean
        default: true
      skip_email:
        description: "Skip emailing entirely"
        type: boolean
        default: false
      min_score:
        description: "Minimum score to trigger email (default 20)"
        default: "20"

permissions:
  contents: write   # needed to commit phds.json back to repo

jobs:
  scrape-score-email:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: phd-finder

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: phd-finder/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install chromium --with-deps

      - name: Create data directory
        run: mkdir -p data frontend/public

      - name: Run PhD Finder
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SKIP_EMAIL: ${{ github.event.inputs.skip_email || 'false' }}
          SKIP_SHEETS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON == '' && 'true' || 'false' }}
          MIN_EMAIL_SCORE: ${{ github.event.inputs.min_score || '20' }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CLIENT_SECRET_JSON: ${{ secrets.GMAIL_CLIENT_SECRET_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          cd scripts
          python main.py

      - name: Commit updated data files
        run: |
          git config user.name "PhD Finder Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/phds.json frontend/public/phds.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update PhD data [$(date -u +%Y-%m-%d)]"
            git push
          fi

  deploy-frontend:
    needs: scrape-score-email
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}  # pick up the freshly committed data

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: phd-finder/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: phd-finder/frontend
        run: npm ci

      - name: Build React frontend
        working-directory: phd-finder/frontend
        env:
          VITE_BASE_PATH: /claude-skills-journalism/phd-finder/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: phd-finder/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
